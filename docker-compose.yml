name: trackflow

services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      api-gateway:
        condition: service_started
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - ingress

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-local}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      API_GATEWAY_PORT: ${API_GATEWAY_PORT:-8081}
      ORDER_SERVICE_URL: ${ORDER_SERVICE_URL:-http://order-service:8082}
      TRACKING_SERVICE_URL: ${TRACKING_SERVICE_URL:-http://tracking-service:8083}
      CARRIER_SYNC_SERVICE_URL: ${CARRIER_SYNC_SERVICE_URL:-http://carrier-sync-service:8084}
      NOTIFICATION_SERVICE_URL: ${NOTIFICATION_SERVICE_URL:-http://notification-service:8085}
    depends_on:
      order-service:
        condition: service_started
      tracking-service:
        condition: service_started
      carrier-sync-service:
        condition: service_started
      notification-service:
        condition: service_started
    expose:
      - "${API_GATEWAY_PORT:-8081}"
    networks:
      - ingress
      - backend

  order-service:
    build:
      context: ./services/order-service
      dockerfile: Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-local}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ORDER_SERVICE_PORT: ${ORDER_SERVICE_PORT:-8082}
      POSTGRES_DSN: ${POSTGRES_DSN:-postgres://trackflow:trackflow@postgres:5432/trackflow?sslmode=disable}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "${ORDER_SERVICE_PORT:-8082}"
    networks:
      - backend

  tracking-service:
    build:
      context: ./services/tracking-service
      dockerfile: Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-local}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TRACKING_SERVICE_PORT: ${TRACKING_SERVICE_PORT:-8083}
      POSTGRES_DSN: ${POSTGRES_DSN:-postgres://trackflow:trackflow@postgres:5432/trackflow?sslmode=disable}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "${TRACKING_SERVICE_PORT:-8083}"
    networks:
      - backend

  carrier-sync-service:
    build:
      context: ./services/carrier-sync-service
      dockerfile: Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-local}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CARRIER_SYNC_SERVICE_PORT: ${CARRIER_SYNC_SERVICE_PORT:-8084}
      CARRIER_API_BASE_URL: ${CARRIER_API_BASE_URL:-https://carrier.example/api}
      CARRIER_API_TOKEN: ${CARRIER_API_TOKEN:-replace-me}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
    depends_on:
      redis:
        condition: service_healthy
    expose:
      - "${CARRIER_SYNC_SERVICE_PORT:-8084}"
    networks:
      - backend

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-local}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NOTIFICATION_SERVICE_PORT: ${NOTIFICATION_SERVICE_PORT:-8085}
      NOTIFICATION_PROVIDER: ${NOTIFICATION_PROVIDER:-mock}
      NOTIFICATION_API_KEY: ${NOTIFICATION_API_KEY:-replace-me}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
    depends_on:
      redis:
        condition: service_healthy
    expose:
      - "${NOTIFICATION_SERVICE_PORT:-8085}"
    networks:
      - backend

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trackflow}
      POSTGRES_USER: ${POSTGRES_USER:-trackflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trackflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-trackflow} -d ${POSTGRES_DB:-trackflow}
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - backend

  redis:
    image: redis:7-alpine
    command: [ "redis-server", "--appendonly", "yes" ]
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - backend

volumes:
  postgres_data:
  redis_data:


networks:
  ingress:
  backend:
